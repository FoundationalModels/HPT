# @package _global_
# PyBullet TriFinger (paper pre-training dataset)
# Embodiment note: single TriFinger platform.

cross_validate: False

dataset_generator_func:
  _target_: env.pybullet.trifinger.rollout_runner.generate_dataset_rollouts
  env_names: ["cube_reach", "cube_push", "cube_lift"]
  max_total_transition: 500000
  episode_num_pertask: ${dataset.episode_cnt}
  save_video: False
  use_image: True

rollout_runner:
  _target_: env.pybullet.trifinger.rollout_runner.RolloutRunner
  episode_num: 50
  env_names: ["cube_reach", "cube_push", "cube_lift"]
  save_video: True

train:
  total_epochs: 1000
  total_iters: 20000
  epoch_iters: 1000
  validation_iters: 100

domains: pybullet_trifinger
