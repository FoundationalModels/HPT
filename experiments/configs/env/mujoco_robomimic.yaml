# @package _global_
# MuJoCo RoboMimic (paper pre-training dataset)
# Embodiment note: RoboMimic includes multiple robots (Franka, Sawyer, IIWA).
# Default assumption here is Franka variants unless overridden in env_names.

cross_validate: False

dataset_generator_func:
  _target_: env.mujoco.robomimic.rollout_runner.generate_dataset_rollouts
  embodiment: franka
  env_names: ["can", "lift", "square", "transport"]
  max_total_transition: 500000
  episode_num_pertask: ${dataset.episode_cnt}
  dataset_root: data/robomimic
  dataset_type: ph
  download: True
  convert: True
  save_video: False
  use_image: True

rollout_runner:
  _target_: env.mujoco.robomimic.rollout_runner.RolloutRunner
  episode_num: 50
  embodiment: franka
  env_names: ["can", "lift", "square", "transport"]
  save_video: True

train:
  total_epochs: 1000
  total_iters: 20000
  epoch_iters: 1000
  validation_iters: 100

domains: mujoco_robomimic
